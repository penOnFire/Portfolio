<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <!-- Tailwind CSS CDN -->
    <link href="https://cdn.tailwindcss.com?include=base,dark" rel="stylesheet">
    <!-- Custom styles if needed -->
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: #fff;
            padding: 2rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        h2 {
            text-align: center;
            margin-bottom: 2rem;
        }

        .image-container {
            position: relative;
            height: 250px;
            width: 300px;
            overflow: hidden;
        }

        .image-text {
            position: absolute;
            bottom: -16px;
            left: 0;
            right: 0;
            text-align: center;
            color: #fff;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="login-container">
    <h2 className="text-2xl font-semibold mb-6">Login</h2>

    <div class="image-container">
        <!-- Add your image here -->
        <img src="/path/to/your/image.png" alt="Image Description" class="w-full h-full object-cover" />
        <span class="image-text">[No vision model configured — set one in Settings → Vision]</span>
    </div>

    <form action="#" method="post">
        <div className="mb-4">
            <label for="username" className="block text-gray-700 text-sm font-bold mb-2">Username</label>
            <input type="text" id="username" name="username" required className="appearance-none border border-gray-300 rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:border-indigo-500" />
        </div>

        <div className="mb-6">
            <label for="password" className="block text-gray-700 text-sm font-bold mb-2">Password</label>
            <input type="password" id="password" name="password" required className="appearance-none border border-gray-300 rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:border-indigo-500" />
        </div>

        <div className="flex items-center justify-between">
            <button type="submit" className="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-md">Login</button>
            <!-- Optionally, add a link for registration -->
            <a href="/register" className="text-blue-500 hover:text-blue-800 font-semibold ml-2">Register</a>
        </div>
    </form>
</div>

</body>
</html>
